<!DOCTYPE html>
<html lang="th">
<head>
    <title>ระบบตรวจนับพัสดุ คณะวารสารศาสตร์และสื่อสารมวลชน</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" href="https://quota.jc.tu.ac.th/images/jc_logo.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --primary-color: #5e35b1; 
            --secondary-color: #ffd54f; 
            --btn-color: #743d88; 
            --btn-hover: #5e35b1;
            --text-color: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            width: 100%;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: #fdfbf7;
            display: flex;
            justify-content: center;
            align-items: center; /* จัดกึ่งกลางแนวตั้ง */
            min-height: 100vh;
            width: 100%; 
            position: relative;
            padding: 20px; /* กันชิดขอบ */
        }

        /* Bg Shapes */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            z-index: -1;
            opacity: 0.6;
        }
        .shape-1 { width: 300px; height: 300px; background: #ffe0b2; top: -50px; right: -50px; }
        .shape-2 { width: 200px; height: 200px; background: #e1bee7; bottom: -50px; left: -50px; }
        
        .main-card {
            background: white;
            width: 100%;
            max-width: 500px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 5px solid var(--primary-color);
            position: relative;
            margin: auto; 
        }

        .logo-img {
            width: 120px;
            margin-bottom: 20px;
            transition: width 0.3s ease; 
        }

        h1 {
            color: var(--primary-color);
            font-size: 1.8rem;
            margin-bottom: 10px;
            line-height: 1.3;
        }
        
        h2 {
            color: #666;
            font-size: 1.1rem;
            font-weight: 300;
            margin-bottom: 30px;
        }

        .info-box {
            background-color: var(--secondary-color);
            color: #4e342e;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            font-size: 0.9rem;
            display: inline-block;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.1);
            width: 100%; /* ให้เต็มความกว้างการ์ด */
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--btn-color);
            color: white;
            font-size: 1.1rem; 
            font-weight: 600;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(94, 53, 177, 0.4);
            border: 2px solid transparent;
            cursor: pointer;
            width: 100%;
            max-width: 350px;
            line-height: 1.4;
        }

        .cta-button:hover {
            background-color: var(--btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(69, 39, 160, 0.5);
        }

        .cta-button:active {
            transform: translateY(1px);
        }

        .arrow-icon {
            margin-left: 10px;
            font-weight: bold;
        }

        /* --- RESPONSIVE ZONE --- */

        /* 1. มือถือแนวตั้ง */
        @media (max-width: 480px) {
            .shape-1 { width: 150px; height: 150px; top: -20px; right: -20px; }
            .shape-2 { width: 120px; height: 120px; bottom: -20px; left: -20px; }
            
            .main-card { padding: 30px 20px; }
            .logo-img { width: 90px; margin-bottom: 15px; }
            
            h1 { font-size: 1.3rem; }
            h2 { font-size: 0.9rem; margin-bottom: 20px; }
            
            .cta-button { font-size: 0.9rem; padding: 12px 15px; }
        }

        /* 2. มือถือแนวนอน (Landscape) - แก้ไขใหม่ */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                align-items: flex-start; /* สำคัญ: ให้เริ่มจากบนสุด ไม่ฝืนกลาง */
                padding-top: 20px;
                padding-bottom: 20px;
                height: auto; /* ปล่อยความสูงอิสระเพื่อให้ Scroll ได้ */
                overflow-y: auto; /* บังคับให้ Scroll แนวตั้งได้ */
            }
            
            .main-card { 
                padding: 20px 30px; 
                margin: 0 auto; /* จัดกลางแนวนอน */
                max-width: 600px; /* ขยายข้างให้กว้างขึ้น */
                display: flex; /* ใช้ Flex จัด layout ภายใน */
                flex-direction: column;
                justify-content: center;
            }

            /* ปรับขนาด Logo */
            .logo-img { 
                width: 60px; 
                margin-bottom: 5px; 
                margin-left: auto; margin-right: auto; /* จัดกลาง */
            } 
            
            /* ลดขนาดตัวอักษรเพื่อประหยัดที่ */
            h1 { font-size: 1.1rem; margin-bottom: 2px; }
            
            /* นำชื่อคณะกลับมา (display: block) แต่ทำให้เล็ก */
            h2 { 
                display: block; 
                font-size: 0.8rem; 
                margin-bottom: 10px; 
            }
            
            .info-box { 
                padding: 8px; 
                margin-bottom: 10px; 
                font-size: 0.8rem;
            }

            .cta-button { 
                padding: 10px 20px; 
                font-size: 0.9rem;
                max-width: 320px;
                margin: 0 auto;
            }
            
            /* ซ่อน Graphic เพื่อความสะอาด */
            .bg-shape { display: none; }
        }
    </style>
</head>
<body>

    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="main-card">
        <img src="https://quota.jc.tu.ac.th/images/jc_logo.png" alt="JC Logo" class="logo-img">
        
        <h1>ระบบตรวจนับพัสดุ</h1>
        <h2>คณะวารสารศาสตร์และสื่อสารมวลชน<br>มหาวิทยาลัยธรรมศาสตร์</h2>

        <div class="info-box">
            📝 กรุณาล็อกอินเพื่อเริ่มการตรวจนับ
        </div>

        <a id="login-btn" href="#" class="cta-button">
            CLICK HERE 
            <span style="font-size: 0.8em; margin-left: 5px; font-weight: 300;">| คลิกที่นี่เพื่อเข้าสู่ระบบ</span>
            <span class="arrow-icon">➔</span>
        </a>
    </div>

    <script>
        function isIOS() { return /iPhone|iPad|iPod/i.test(navigator.userAgent); }
        function isFacebookApp() { return /FBAN|FBAV/i.test(navigator.userAgent); }
        function isLineApp() { return /Line/i.test(navigator.userAgent); }

        function setButtonLink() {
            var btn = document.getElementById('login-btn');
            var targetUrl = 'https://script.google.com/a/macros/jc.tu.ac.th/s/AKfycbzMm3YzwO2AxVM6VcLWqeumqgHhQ8tdglC6DyUFtOMSeDXnfvVc3v-z9SFRIIzE3LGc/exec?fbclid=IwY2xjawGBW81leHRuA2FlbQIxMAABHdECaq9rixZtZgvfwaV2L9iShTggX89gCjLHIh8FitvcQ5mbhBO4I3QqMQ_aem_qaiv8lAS75Wqi8JDAy1KaA';
            
            if (isIOS() && (isFacebookApp() || isLineApp())) {
                btn.href = 'x-safari-' + targetUrl;
            } else {
                btn.href = targetUrl;
            }
        }

        document.getElementById('login-btn').addEventListener('click', function(e) {
            e.preventDefault(); 
            var targetUrl = this.href;

            Swal.fire({
                title: 'กำลังเข้าสู่ระบบ',
                text: 'กรุณารอสักครู่...',
                allowOutsideClick: false, 
                allowEscapeKey: false,
                color: '#5e35b1', 
                confirmButtonColor: '#5e35b1',
                didOpen: () => { Swal.showLoading(); }
            });

            setTimeout(() => { window.location.href = targetUrl; }, 800);
        });

        window.addEventListener('pageshow', function(event) {
            Swal.close(); 
        });

        setButtonLink();
    </script>
</body>
</html>
